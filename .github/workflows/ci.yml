name: CI

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:

jobs:
  rust-quality:
    runs-on: ubuntu-latest
    env:
      COVERAGE_ENGINE_MIN: "90"
      COVERAGE_WORKSPACE_MIN: "80"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace --all-targets

      - name: Coverage gate (engine)
        run: cargo llvm-cov --package walrus-engine --all-targets --fail-under-lines $COVERAGE_ENGINE_MIN --summary-only

      - name: Coverage gate (workspace)
        run: cargo llvm-cov --workspace --all-targets --fail-under-lines $COVERAGE_WORKSPACE_MIN --summary-only
